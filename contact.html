<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact — Toolify Hub</title>
  <meta name="description" content="Contact Toolify Hub — send feedback, report issues, or suggest new tools.">
  <link rel="canonical" href="./contact.html">
  <meta property="og:title" content="Contact — Toolify Hub">
  <meta property="og:description" content="Contact Toolify Hub — send feedback, report issues, or suggest new tools.">
  <meta property="og:type" content="website">
  <link rel="icon" href="./favicon.png" type="image/png">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body data-page="contact">
  <header id="site-header"></header>
  <main class="container">
    <section class="hero">
      <h1 class="site-title" data-i18n="contact.title">Contact</h1>
      <p class="lead" data-i18n="contact.lead">We'd love to hear from you. Use the form below to send feedback or report an issue.</p>
    </section>

    <section class="panel">
      <form id="contact-form">
        <label for="name" data-i18n="contact.label.name">Name</label>
        <input id="name" name="name" data-i18n-placeholder="contact.placeholder.name" placeholder="Your name" />
        <label for="email" data-i18n="contact.label.email">Email</label>
        <input id="email" name="email" type="email" data-i18n-placeholder="contact.placeholder.email" placeholder="you@example.com" />
        <label for="message" data-i18n="contact.label.message">Message</label>
        <textarea id="message" name="message" rows="6" data-i18n-placeholder="contact.placeholder.message" placeholder="How can we help?"></textarea>
        <div class="tool-actions">
          <button type="button" id="contact-send" class="btn" data-i18n="contact.btn.send">Send</button>
          <button type="button" id="contact-reset" class="btn btn-ghost" data-i18n="contact.btn.reset">Reset</button>
        </div>
      </form>
    </section>

    <section class="panel" style="margin-top:20px">
      <h3 data-i18n="contact.social.title">Connect with Us</h3>
      <p data-i18n="contact.social.lead" style="color:var(--muted);margin-bottom:14px">You can also reach us on social media:</p>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <a href="https://wa.me/966556709988" target="_blank" rel="noopener noreferrer" class="btn" style="gap:6px;text-decoration:none">
          <span style="font-size:1.2rem">📱</span>
          <span>WhatsApp</span>
        </a>
        <a href="https://facebook.com/toolifyhub" target="_blank" rel="noopener noreferrer" class="btn btn-ghost" style="gap:6px;text-decoration:none">
          <span style="font-size:1.2rem">👍</span>
          <span>Facebook</span>
        </a>
        <a href="https://instagram.com/toolifyhub" target="_blank" rel="noopener noreferrer" class="btn btn-ghost" style="gap:6px;text-decoration:none">
          <span style="font-size:1.2rem">📸</span>
          <span>Instagram</span>
        </a>
      </div>
    </section>
  </main>
  <footer id="site-footer"></footer>
  <script src="./js/main.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function(){
      const send = document.getElementById('contact-send');
      const reset = document.getElementById('contact-reset');
      const form = document.getElementById('contact-form');
      if(send){ send.addEventListener('click', ()=>{
        // client-side demo only — open mailto with subject
        const name = document.getElementById('name').value || 'Anonymous';
        const email = document.getElementById('email').value || '';
        const msg = document.getElementById('message').value || '';
        const body = encodeURIComponent('From: '+name+' ('+email+')\n\n'+msg);
        window.location.href = 'gmail:hasanjohan3939@gmail.com?subject='+encodeURIComponent('Feedback from '+name)+'&body='+body;
      }); }
      if(reset){ reset.addEventListener('click', ()=>{ form.reset(); }); }
    });
  </script>
</body>
</html>
