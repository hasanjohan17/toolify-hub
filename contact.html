<head>
  <meta charset="utf-8">

  <script>!function(){var t=localStorage.getItem('devtools-theme'),e=t||((window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light');if('dark'===e){if(!document.documentElement.style.colorScheme)document.documentElement.style.colorScheme='dark';document.body&&document.body.setAttribute('data-theme','dark')}else{document.documentElement.style.colorScheme='light';document.body&&document.body.removeAttribute('data-theme')}}()</script>

  <noscript><link rel="stylesheet" href="./css/style.css"></noscript>
</head>
<body data-page="contact">
  <header id="site-header"></header>
  <main class="container">
    <section class="hero">
      <h1 class="site-title" data-i18n="contact.title">Contact</h1>
      <p class="lead" data-i18n="contact.lead">We'd love to hear from you. Use the form below to send feedback or report an issue.</p>
    </section>

    <!-- Contact Form -->
    <section class="panel" style="max-width:600px;margin:0 auto 40px">
      <h2 style="margin-top:0">Send us a Message</h2>
      <form id="contact-form" style="display:flex;flex-direction:column;gap:15px">
        
        <div>
          <label for="contact-name" data-i18n="contact.label.name">Name</label>
          <input id="contact-name" type="text" name="name" required data-i18n-placeholder="contact.placeholder.name" placeholder="Your name" style="width:100%;padding:12px;border-radius:8px;border:1px solid rgba(15,23,42,0.06);background:transparent;font-family:inherit"/>
        </div>

        <div>
          <label for="contact-email" data-i18n="contact.label.email">Email</label>
          <input id="contact-email" type="email" name="email" required data-i18n-placeholder="contact.placeholder.email" placeholder="you@example.com" style="width:100%;padding:12px;border-radius:8px;border:1px solid rgba(15,23,42,0.06);background:transparent;font-family:inherit"/>
        </div>

        <div>
          <label for="contact-subject">Subject</label>
          <input id="contact-subject" type="text" name="subject" required placeholder="What is this about?" style="width:100%;padding:12px;border-radius:8px;border:1px solid rgba(15,23,42,0.06);background:transparent;font-family:inherit"/>
        </div>

        <div>
          <label for="contact-message" data-i18n="contact.label.message">Message</label>
          <textarea id="contact-message" name="message" required data-i18n-placeholder="contact.placeholder.message" placeholder="How can we help?" style="width:100%;padding:12px;border-radius:8px;border:1px solid rgba(15,23,42,0.06);background:transparent;font-family:inherit;min-height:150px;resize:vertical"></textarea>
        </div>

        <div id="form-status" style="display:none;padding:12px;border-radius:8px;text-align:center"></div>

        <div style="display:flex;gap:10px">
          <button type="submit" class="btn" data-i18n="contact.btn.send">Send Message</button>
          <button type="reset" class="btn btn-ghost" data-i18n="contact.btn.reset">Clear</button>
        </div>
      </form>
    </section>

    <!-- Social Contact - Alternative Methods -->
    <section class="panel" style="max-width:600px;margin:0 auto">
      <h3 data-i18n="contact.social.title">Connect with Us</h3>
      <p data-i18n="contact.social.lead" style="color:var(--muted);margin-bottom:14px">You can reach us directly through:</p>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <a href="https://wa.me/963947530585" target="_blank" rel="noopener noreferrer" class="btn" style="text-decoration:none">
          <span>WhatsApp</span>
        </a>
        <a href="mailto:hasanjohan3939@gmail.com" target="_blank" rel="noopener noreferrer" class="btn btn-ghost" style="text-decoration:none">
          <span>Gmail</span>
        </a>
        <a href="https://www.facebook.com/share/18GwveK3JB/" target="_blank" rel="noopener noreferrer" class="btn btn-ghost" style="text-decoration:none">
          <span>Facebook</span>
        </a>
        <a href="https://www.instagram.com/fx_7z?igsh=Z3dlbWFyZGc0MTY4" target="_blank" rel="noopener noreferrer" class="btn btn-ghost" style="text-decoration:none">
          <span>Instagram</span>
        </a>
      </div>
    </section>
  </main>
  <footer id="site-footer"></footer>
  <style>
    .contact-no-hover:hover {
      box-shadow: 0 6px 18px rgba(99,102,241,0.12) !important;
      transform: none !important;
    }
  </style>
  <script src="./js/main.js" defer></script>
</body>
</html>
