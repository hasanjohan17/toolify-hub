<body data-page="tool-word-counter">
  <div id="site-header"></div>

  <main class="container tool">
    <h1 class="tool-title" data-i18n="tool.word_counter">عداد الكلمات</h1>
    <p style="color:var(--muted)" data-i18n="wc.lead">احسب الكلمات والأحرف وقدر وقت القراءة.</p>

    <section class="panel full">
      <label for="wc-input" data-i18n="wc.label.text">النص</label>
      <textarea id="wc-input" class="code" data-i18n-placeholder="wc.placeholder" placeholder="الصق نصك هنا..."></textarea>

      <div class="wc-stats">
        <div><strong id="wc-words">0</strong><span data-i18n="wc.stat.words">كلمات</span></div>
        <div><strong id="wc-chars">0</strong><span data-i18n="wc.stat.chars">أحرف</span></div>
        <div><strong id="wc-sentences">0</strong><span data-i18n="wc.stat.sentences">جمل</span></div>
        <div><strong id="wc-time">0 دقيقة</strong><span data-i18n="wc.stat.read">قراءة</span></div>
      </div>

      <div class="tool-actions">
        <button id="wc-copy" class="btn" data-i18n="wc.btn.copy">انسخ النص</button>
        <button id="wc-clear" class="btn btn-ghost" data-i18n="wc.btn.clear">امسح</button>
        <button id="wc-reset" class="btn btn-ghost" data-i18n="wc.btn.reset">حذف</button>
      </div>
    </section>
    <section style="margin-top: 20px; padding: 20px; background: var(--glass); border-radius: 8px;">
      <h3 style="margin-top: 0;">أدوات ذات صلة</h3>

      </div>
    </section>
