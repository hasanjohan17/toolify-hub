  <script>!function(){var t=localStorage.getItem('devtools-theme'),e=t||((window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light');if('dark'===e){if(!document.documentElement.style.colorScheme)document.documentElement.style.colorScheme='dark';document.body&&document.body.setAttribute('data-theme','dark')}else{document.documentElement.style.colorScheme='light';document.body&&document.body.removeAttribute('data-theme')}}()</script>

<body data-page="color-generator">
  <div id="site-header"></div>

  <main class="container tool">
    <h1 class="tool-title" data-i18n="tool.color_generator">مولد الألوان</h1>
    <p style="color:var(--muted)" data-i18n="cg.lead">وليد الألوان ولوحات الألوان.</p>

    <section class="panel">
      <div class="color-row">
        <div id="color-swatch" class="swatch" aria-hidden="true"></div>
        <div class="color-values">
          <div><label data-i18n="cg.label.hex">HEX</label><input id="hex" readonly></div>
          <div><label data-i18n="cg.label.rgb">RGB</label><input id="rgb" readonly></div>
          <div><label data-i18n="cg.label.hsl">HSL</label><input id="hsl" readonly></div>
        </div>
      </div>

      <div class="tool-actions">
        <button id="gen-color" class="btn" data-i18n="cg.btn.generate">وليد</button>
        <button id="copy-hex" class="btn btn-small" data-i18n="cg.btn.copy_hex">انسخ HEX</button>
        <button id="copy-rgb" class="btn btn-small btn-ghost" data-i18n="cg.btn.copy_rgb">انسخ RGB</button>
      </div>
    </section>
    <!-- Ad Middle -->
