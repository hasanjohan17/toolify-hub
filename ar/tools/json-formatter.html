  <script>!function(){var t=localStorage.getItem('devtools-theme'),e=t||((window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light');if('dark'===e){if(!document.documentElement.style.colorScheme)document.documentElement.style.colorScheme='dark';document.body&&document.body.setAttribute('data-theme','dark')}else{document.documentElement.style.colorScheme='light';document.body&&document.body.removeAttribute('data-theme')}}()</script>

<body data-page="tool-json-formatter">
  <div id="site-header"></div>

  <main class="container tool">
    <h1 class="tool-title">منسق JSON</h1>
    <p style="color:var(--muted)">تنسيق والتحقق وضغط JSON. من جانب العميل فقط.</p>

    <div class="tool-grid">
      <section class="panel">
        <label for="json-input">إدخال JSON</label>
        <textarea id="json-input" class="code" placeholder='الصق JSON هنا...'></textarea>

        <div class="tool-actions">
          <button id="format-btn" class="btn">تنسيق</button>
          <button id="minify-btn" class="btn btn-ghost">ضغط</button>
          <button id="validate-btn" class="btn btn-ghost">تحقق</button>
          <button id="copy-input-btn" class="btn btn-small">انسخ</button>
        </div>
      </section>

      <section class="panel">
        <label for="json-output">الناتج</label>
        <textarea id="json-output" class="code" readonly placeholder="سيظهر JSON المنسق هنا"></textarea>
        <div class="tool-actions">
          <button id="copy-output-btn" class="btn">انسخ الناتج</button>
          <button id="reset-json" class="btn btn-ghost">حذف</button>
        </div>
      </section>
    </div>
    <!-- Ad Middle -->
  </main>

  <div id="site-footer"></div>
  <!-- Ad Bottom -->
  <script src="../../js/main.js" defer></script>
