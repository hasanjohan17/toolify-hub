<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <base href="../../">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>الصور إلى PDF — Quarx AI | تحويل الصور إلى PDF</title>
  <meta name="description" content="حوّل عدة صور إلى ملف PDF واحد. اختر حجم الصفحة والاتجاه ورتب الصور بسهولة.">
  <meta name="keywords" content="تحويل الصور إلى PDF, صور إلى PDF, محول PDF, دمج الصور, تجميع صور">
  <link rel="canonical" href="https://quarx-ai.vercel.app/ar/tools/images-to-pdf.html">
  <link rel="icon" href="../../favicon.svg?v=2" type="image/svg+xml">
  <link rel="icon" href="../../favicon.png?v=2" type="image/png">
  <link rel="apple-touch-icon" href="../../favicon.png?v=2">
  <script>!function(){var t=localStorage.getItem('devtools-theme'),e=t||((window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light');if('dark'===e){if(!document.documentElement.style.colorScheme)document.documentElement.style.colorScheme='dark';document.body&&document.body.setAttribute('data-theme','dark')}else{document.documentElement.style.colorScheme='light';document.body&&document.body.removeAttribute('data-theme')}}()</script>
  <link rel="preload" href="../../css/style.css" as="style" onload="this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="../../css/style.css"></noscript>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    .img-preview { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; }
    .img-item { position: relative; width: 120px; height: 120px; border: 1px solid rgba(15,23,42,0.1); border-radius: 8px; overflow: hidden; background: rgba(15,23,42,0.03); }
    .img-item img { width: 100%; height: 100%; object-fit: cover; }
    .img-item .remove { position: absolute; top: 4px; left: 4px; width: 20px; height: 20px; background: rgba(255, 59, 48, 0.9); color: white; border: none; border-radius: 50%; cursor: pointer; font-size: 12px; line-height: 1; }
    .img-item .remove:hover { background: rgba(255, 59, 48, 1); }
    .no-images { padding: 20px; text-align: center; color: var(--muted); }
  </style>
</head>
<body data-page="tool-i2pdf">
  <div id="site-header"></div>
  <main class="container tool">
    <h1 class="tool-title" data-i18n="tool.images_to_pdf">الصور إلى PDF</h1>
    <p style="color:var(--muted)" data-i18n="i2pdf.lead">دمج صور متعددة في ملف PDF واحد.</p>

    <section class="panel">
      <label data-i18n="i2pdf.label.images">الصور</label>
      <input id="img-upload" type="file" multiple accept="image/*" style="padding:10px;border-radius:8px;border:1px solid rgba(15,23,42,0.04);width:100%">
      
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px">
        <div>
          <label data-i18n="i2pdf.label.pagesize">حجم الصفحة</label>
          <select id="page-size" style="padding:8px;border-radius:8px;border:1px solid rgba(15,23,42,0.04);width:100%">
            <option value="A4">A4 (210x297mm)</option>
            <option value="A3">A3 (297x420mm)</option>
            <option value="Letter">Letter (8.5x11in)</option>
            <option value="A5">A5 (148x210mm)</option>
          </select>
        </div>
        <div>
          <label data-i18n="i2pdf.label.orientation">الاتجاه</label>
          <select id="orientation" style="padding:8px;border-radius:8px;border:1px solid rgba(15,23,42,0.04);width:100%">
            <option value="portrait" data-i18n-key="i2pdf.opt.portrait">عمودي</option>
            <option value="landscape" data-i18n-key="i2pdf.opt.landscape">أفقي</option>
          </select>
        </div>
      </div>

      <div style="margin-top:14px">
        <label>معاينة:</label>
        <div id="preview" class="img-preview">
          <div class="no-images" data-i18n="i2pdf.label.images">لم يتم اختيار صور</div>
        </div>
      </div>

      <div class="tool-actions" style="margin-top:14px">
        <button id="gen-pdf" class="btn" data-i18n="i2pdf.btn.generate">توليد PDF</button>
        <button id="download-pdf" class="btn" data-i18n="i2pdf.btn.download" style="display:none;">تحميل PDF</button>
        <button id="reset-img" class="btn btn-ghost" data-i18n="i2pdf.btn.reset">إعادة ضبط</button>
      </div>
      
      <div id="pdf-viewer" style="margin-top:20px;display:none;border:1px solid rgba(15,23,42,0.1);border-radius:8px;overflow:hidden;background:white">
        <iframe id="pdf-iframe" style="width:100%;height:600px;border:none;display:block"></iframe>
      </div>
    </section>
    <section style="margin-top: 20px; padding: 20px; background: var(--glass); border-radius: 8px;">
      <h3 style="margin-top: 0;">أدوات ذات صلة</h3>
      <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <a href="../../ar/tools/image-compressor.html" class="btn btn-small" style="background: var(--accent); color: white;">ضاغط الصور</a>
        <a href="../../ar/tools/qr-code.html" class="btn btn-small" style="background: var(--accent); color: white;">مولد رمز QR</a>
      </div>
    </section>

    <section style="margin-top: 20px; padding: 20px; background: var(--glass); border-radius: 8px; text-align: center;">
      <h3 style="margin-top: 0;">شارك هذه الأداة</h3>
      <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
        <a href="https://twitter.com/intent/tweet?url=https://quarx-ai.vercel.app/ar/tools/images-to-pdf.html&text=%D8%AA%D8%AD%D9%88%D9%8A%D9%84%20%D8%A7%D9%84%D8%B5%D9%88%D8%B1%20%D8%A5%D9%84%D9%89%20PDF%20%D9%85%D9%86%20Quarx%20AI" target="_blank" rel="noopener" class="btn btn-small">تويتر</a>
        <a href="https://www.linkedin.com/sharing/share-offsite/?url=https://quarx-ai.vercel.app/ar/tools/images-to-pdf.html" target="_blank" rel="noopener" class="btn btn-small">LinkedIn</a>
        <button onclick="copyShareLink()" class="btn btn-small" title="انسخ الرابط">انسخ الرابط</button>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="../../js/main.js" defer></script>
  <script>
    (function(){
      const imgInput = document.getElementById('img-upload');
      const preview = document.getElementById('preview');
      const pageSize = document.getElementById('page-size');
      const orientation = document.getElementById('orientation');
      const genPdfBtn = document.getElementById('gen-pdf');
      const downloadBtn = document.getElementById('download-pdf');
      const resetBtn = document.getElementById('reset-img');
      const pdfViewer = document.getElementById('pdf-viewer');
      const pdfIframe = document.getElementById('pdf-iframe');
      
      let images = [];
      let currentPdf = null;

      function updatePreview(){
        preview.innerHTML = '';
        if(images.length === 0){
          preview.innerHTML = '<div class="no-images" data-i18n="i2pdf.label.images">لم يتم اختيار صور</div>';
          return;
        }
        images.forEach((img, idx) => {
          const item = document.createElement('div');
          item.className = 'img-item';
          item.innerHTML = `<img src="${img.data}" alt="صورة ${idx+1}"><button class="remove" type="button">×</button>`;
          item.querySelector('.remove').onclick = () => {
            images.splice(idx, 1);
            updatePreview();
          };
          preview.appendChild(item);
        });
      }

      imgInput.addEventListener('change', (e) => {
        const files = Array.from(e.target.files);
        files.forEach(file => {
          const reader = new FileReader();
          reader.onload = (event) => {
            images.push({ name: file.name, data: event.target.result });
            updatePreview();
          };
          reader.readAsDataURL(file);
        });
      });

      genPdfBtn.addEventListener('click', async () => {
        if(images.length === 0) {
          alert('الرجاء اختيار صورة واحدة على الأقل');
          return;
        }
        
        genPdfBtn.disabled = true;
        const originalText = genPdfBtn.textContent;
        genPdfBtn.textContent = 'جاري الإنشاء...';
        
        try {
          const { jsPDF } = window.jspdf;
          const orient = orientation.value === 'landscape' ? 'l' : 'p';
          const pdf = new jsPDF({
            orientation: orient,
            unit: 'mm',
            format: pageSize.value
          });

          const pageWidth = pdf.internal.pageSize.getWidth();
          const pageHeight = pdf.internal.pageSize.getHeight();

          const skippedImages = [];
          let addedImages = 0;
          for(let i = 0; i < images.length; i++){
            let img;
            try {
              img = await new Promise((resolve, reject) => {
                const image = new Image();
                image.onload = () => resolve(image);
                image.onerror = () => reject(new Error(`فشل تحميل الصورة رقم ${i + 1}: ${images[i].name || 'صورة غير معروفة'}`));
                image.src = images[i].data;
              });
            } catch (loadErr) {
              skippedImages.push(loadErr.message);
              continue;
            }

            const imgWidth = img.naturalWidth;
            const imgHeight = img.naturalHeight;
            const ratio = imgWidth / imgHeight;

            let width = pageWidth - 10;
            let height = width / ratio;

            if(height > pageHeight - 10){
              height = pageHeight - 10;
              width = height * ratio;
            }

            const x = (pageWidth - width) / 2;
            const y = (pageHeight - height) / 2;

            if(addedImages > 0) pdf.addPage();
            pdf.addImage(images[i].data, 'JPEG', x, y, width, height);
            addedImages += 1;
          }

          if(addedImages === 0){
            throw new Error('تعذر تحميل جميع الصور المحددة.');
          }

          currentPdf = pdf;
          const pdfBlob = pdf.output('blob');
          const pdfUrl = URL.createObjectURL(pdfBlob);
          
          pdfIframe.src = pdfUrl;
          pdfViewer.style.display = 'block';
          downloadBtn.style.display = 'inline-block';
          genPdfBtn.textContent = originalText;
          genPdfBtn.disabled = false;

          if(skippedImages.length > 0){
            const details = skippedImages.slice(0, 3).join('\n');
            alert(`تم تخطي بعض الصور بسبب فشل التحميل (${skippedImages.length}/${images.length}).\n${details}`);
          }
          
        } catch(err){
          console.error(err);
          alert('خطأ في إنشاء PDF: ' + err.message);
          genPdfBtn.textContent = originalText;
          genPdfBtn.disabled = false;
        }
      });

      downloadBtn.addEventListener('click', () => {
        if(currentPdf) {
          currentPdf.save('الصور.pdf');
        }
      });

      resetBtn.addEventListener('click', () => {
        images = [];
        imgInput.value = '';
        currentPdf = null;
        updatePreview();
        pdfViewer.style.display = 'none';
        pdfIframe.src = '';
        downloadBtn.style.display = 'none';
      });
    })();
  </script>
</body>
</html>
