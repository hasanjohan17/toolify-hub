<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <base href="../../">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>مولد رموز QR — Quarx AI | توليد QR Code</title>
  <meta name="description" content="مولد رموز QR - أداة مجانية لتوليد رموز QR من نص أو روابط ويب.">
  <meta name="keywords" content="مولد QR, QR code, توليد رموز, QR code عربي">
  <link rel="canonical" href="https://quarx-ai.vercel.app/ar/tools/qr-code.html">
  <link rel="alternate" hreflang="ar" href="https://quarx-ai.vercel.app/ar/tools/qr-code.html">
  <link rel="alternate" hreflang="en" href="https://quarx-ai.vercel.app/tools/qr-code.html">
  <link rel="alternate" hreflang="x-default" href="https://quarx-ai.vercel.app/tools/qr-code.html">
  <link rel="icon" href="../../favicon.svg?v=2" type="image/svg+xml">
  <link rel="icon" href="../../favicon.png?v=2" type="image/png">
  <link rel="apple-touch-icon" href="../../favicon.png?v=2">
  <script>!function(){var t=localStorage.getItem('devtools-theme'),e=t||((window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light');if('dark'===e){if(!document.documentElement.style.colorScheme)document.documentElement.style.colorScheme='dark';document.body&&document.body.setAttribute('data-theme','dark')}else{document.documentElement.style.colorScheme='light';document.body&&document.body.removeAttribute('data-theme')}}()</script>
  <link rel="preload" href="../../css/style.css" as="style" onload="this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="../../css/style.css"></noscript>
</head>
<body data-page="tool-qr">
  <div id="site-header"></div>
  <main class="container tool">
    <h1 class="tool-title" data-i18n="tool.qr_code">مولد رموز QR</h1>
    <p style="color:var(--muted)" data-i18n="qr.lead">أدخل نص أو رابط لإنشاء رمز QR.</p>

    <section class="panel">
      <label for="qr-input" data-i18n="qr.label.input">النص أو الرابط</label>
      <input id="qr-input" data-i18n-placeholder="qr.placeholder.input" style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(15,23,42,0.04)">
      <div class="tool-actions">
        <button id="qr-gen" class="btn" data-i18n="qr.btn.generate">وليد</button>
        <button id="qr-copy" class="btn btn-small" data-i18n="qr.btn.copy">انسخ رابط الصورة</button>
      </div>
    </section>
    <section class="panel">
      <label data-i18n="qr.label.preview">معاينة QR</label>
      <div id="qr-preview" style="display:flex;justify-content:center;align-items:center;padding:20px;min-height:340px;background:rgba(15,23,42,0.02);border-radius:12px">
        <canvas id="qr-canvas" width="340" height="340" style="border-radius:8px;border:1px solid rgba(15,23,42,0.04);display:none;max-width:100%;"></canvas>
        <img id="qr-img" alt="qr" src="" loading="lazy" style="max-width:100%;max-height:340px;border-radius:8px;border:1px solid rgba(15,23,42,0.04);" onerror="this.alt='فشل تحميل رمز QR'">
        <p id="qr-loading" style="display:none;color:var(--muted);text-align:center">جاري إنشاء رمز QR...</p>
      </div>
      <div class="tool-actions" style="margin-top:14px">
        <button id="qr-download" class="btn btn-small" download="qr-code.png" disabled>تحميل صورة QR</button>
      </div>
    </section>

    <section style="margin-top: 20px; padding: 20px; background: var(--glass); border-radius: 8px;">
      <h3 style="margin-top: 0;">أدوات ذات صلة</h3>
      <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <a href="../../ar/tools/images-to-pdf.html" class="btn btn-small" style="background: var(--accent); color: white;">الصور إلى PDF</a>
        <a href="../../ar/tools/base64.html" class="btn btn-small" style="background: var(--accent); color: white;">محول Base64</a>
      </div>
    </section>

    <section style="margin-top: 20px; padding: 20px; background: var(--glass); border-radius: 8px; text-align: center;">
      <h3 style="margin-top: 0;">شارك هذه الأداة</h3>
      <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
        <a href="https://twitter.com/intent/tweet?url=https://quarx-ai.vercel.app/ar/tools/qr-code.html&text=%D9%85%D9%88%D9%84%D8%AF%20%D8%AA%D8%B3%D9%91%D8%AC%D9%8A%D9%84%20QR%20%D9%85%D9%86%20Quarx%20AI" target="_blank" rel="noopener" class="btn btn-small">تويتر</a>
        <a href="https://www.linkedin.com/sharing/share-offsite/?url=https://quarx-ai.vercel.app/ar/tools/qr-code.html" target="_blank" rel="noopener" class="btn btn-small">LinkedIn</a>
        <button onclick="window.copyShareLink(window.location.href, this)" class="btn btn-small" title="انسخ الرابط">انسخ الرابط</button>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="../../js/main.js" defer></script>
</body>
</html>
