<body data-page="tool-password-generator">
  <div id="site-header"></div>
  <main class="container tool">
    <h1 class="tool-title" data-i18n="tool.password_generator">مولد كلمات المرور</h1>
    <p style="color:var(--muted)" data-i18n="pw.lead">أنشئ كلمات مرور قوية بخيارات.</p>

    <section class="panel">
      <label for="pw-length" data-i18n="pw.label.length">الطول</label>
      <input id="pw-length" type="number" min="4" max="128" value="16" style="padding:8px;border-radius:8px;border:1px solid rgba(15,23,42,0.04);width:120px">
      <div style="margin-top:10px">
        <label><input id="pw-upper" type="checkbox" checked> <span data-i18n="pw.opt.upper">أحرف كبيرة</span></label>
        <label style="margin-left:10px"><input id="pw-lower" type="checkbox" checked> <span data-i18n="pw.opt.lower">أحرف صغيرة</span></label>
        <label style="margin-left:10px"><input id="pw-numbers" type="checkbox" checked> <span data-i18n="pw.opt.numbers">أرقام</span></label>
        <label style="margin-left:10px"><input id="pw-symbols" type="checkbox"> <span data-i18n="pw.opt.symbols">رموز</span></label>
      </div>
      <div class="tool-actions" style="margin-top:12px">
        <button id="pw-generate" class="btn" data-i18n="pw.btn.generate">وليد</button>
        <button id="pw-copy" class="btn btn-small" data-i18n="pw.btn.copy">انسخ</button>
      </div>
    </section>

    <section class="panel">
      <label for="pw-output" data-i18n="pw.label.output">كلمة المرور</label>
      <input id="pw-output" readonly style="width:100%;padding:12px;border-radius:8px;border:1px solid rgba(15,23,42,0.04);background:transparent">
      <!-- Ad Middle -->
    </section>
    <section style="margin-top: 20px; padding: 20px; background: var(--glass); border-radius: 8px;">
      <h3 style="margin-top: 0;">أدوات ذات صلة</h3>
      <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <a href="../../ar/tools/color-generator.html" class="btn btn-small" style="background: var(--accent); color: white;">مولد الألوان</a>
        <a href="../../ar/tools/base64.html" class="btn btn-small" style="background: var(--accent); color: white;">محول Base64</a>
      </div>
    </section>

    <section style="margin-top: 20px; padding: 20px; background: var(--glass); border-radius: 8px; text-align: center;">
      <h3 style="margin-top: 0;">شارك هذه الأداة</h3>
      <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">

        <button onclick="window.copyShareLink(window.location.href, this)" class="btn btn-small" title="انسخ الرابط">انسخ الرابط</button>
      </div>
