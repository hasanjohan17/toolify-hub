<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <base href="../">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>QR Code Generator - Free Online QR Maker | Quarx AI</title>
  <meta name="description" content="Create QR codes instantly for free. Generate QR codes from URLs, text, WiFi, vCards. Download as PNG or SVG. No registration needed.">
  <meta name="keywords" content="qr code generator, free qr code maker, create qr code, qr code creator, online qr generator">
  <link rel="canonical" href="./tools/qr-code.html">
  <link rel="icon" href="../favicon.svg?v=2" type="image/svg+xml">
  <link rel="icon" href="../favicon.png?v=2" type="image/png">
  <link rel="apple-touch-icon" href="../favicon.png?v=2">
  <script>!function(){var t=localStorage.getItem('devtools-theme'),e=t||((window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light');if('dark'===e){if(!document.documentElement.style.colorScheme)document.documentElement.style.colorScheme='dark';document.body.setAttribute('data-theme','dark')}else{document.documentElement.style.colorScheme='light';document.body.removeAttribute('data-theme')}}()</script>
  <link rel="preload" href="./css/style.css" as="style" onload="this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="./css/style.css"></noscript>
</head>
<body data-page="tool-qr">
  <div id="site-header"></div>
  <main class="container tool">
    <h1 class="tool-title" data-i18n="tool.qr_code">QR Code Generator</h1>
    <p style="color:var(--muted)" data-i18n="qr.lead">Enter text or a URL to create a QR code.</p>

    <section class="panel">
      <label for="qr-input" data-i18n="qr.label.input">Text or URL</label>
      <input id="qr-input" data-i18n-placeholder="qr.placeholder.input" style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(15,23,42,0.04)">
      <div class="tool-actions">
        <button id="qr-gen" class="btn" data-i18n="qr.btn.generate">Generate</button>
        <button id="qr-copy" class="btn btn-small" data-i18n="qr.btn.copy">Copy Image URL</button>
      </div>
    </section>
    <section class="panel">
      <label data-i18n="qr.label.preview">QR Preview</label>
      <div id="qr-preview" style="display:flex;justify-content:center;align-items:center;padding:20px;min-height:340px;background:rgba(15,23,42,0.02);border-radius:12px">
        <canvas id="qr-canvas" width="340" height="340" style="border-radius:8px;border:1px solid rgba(15,23,42,0.04);display:none;max-width:100%;"></canvas>
        <img id="qr-img" alt="qr" src="" loading="lazy" style="max-width:100%;max-height:340px;border-radius:8px;border:1px solid rgba(15,23,42,0.04);" onerror="this.alt='Failed to load QR code'">
        <p id="qr-loading" style="display:none;color:var(--muted);text-align:center">Generating QR code...</p>
      </div>
      <div class="tool-actions" style="margin-top:14px">
        <button id="qr-download" class="btn btn-small" download="qr-code.png" disabled>Download QR Image</button>
      </div>
    </section>

    <!-- Related Tools Section -->
    <section class="panel" style="margin-top:20px">
      <h2 style="margin-top:0">Related Tools</h2>
      <div style="display:flex;gap:12px;flex-wrap:wrap">

        <a href="../tools/base64.html" class="btn btn-small">Base64 Encoder</a>

    </section>

    <!-- Social Sharing Section -->
    <section class="panel" style="margin-top:20px;text-align:center">
      <h2 style="margin-top:0">Share This Tool</h2>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <a href="https://twitter.com/intent/tweet?url=https://quarx-ai.vercel.app/tools/qr-code.html&text=Generate%20QR%20codes%20instantly%20with%20this%20free%20online%20QR%20Code%20Generator%20from%20Quarx%20AI" target="_blank" class="btn btn-small">Twitter</a>

        <button onclick="copyShareLink('https://quarx-ai.vercel.app/tools/qr-code.html')" class="btn btn-small">Copy Link</button>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="./js/main.js" defer></script>
