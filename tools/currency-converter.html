  <script>
    const currencyNames = {
      'SYP': 'Syrian Pound (New)',
      'TRY': 'Turkish Lira',
      'EGP': 'Egyptian Pound',
      'SAR': 'Saudi Riyal',
      'JOD': 'Jordanian Dinar',
      'IQD': 'Iraqi Dinar',
      'EUR': 'Euro'
    };

    let exchangeRates = {};

    // Fetch live exchange rates from a reliable API
    async function fetchExchangeRates(){
      try {
        const response = await fetch('https://open.er-api.com/v6/latest/USD');
        if(!response.ok) throw new Error('API error');
        const data = await response.json();
        
        if(data.rates){
          // Convert USD rates to per-USD rates for each currency
          exchangeRates.SYP = 1 / (data.rates.SYP || 1);
          exchangeRates.TRY = 1 / (data.rates.TRY || 1);
          exchangeRates.EGP = 1 / (data.rates.EGP || 1);
          exchangeRates.SAR = 1 / (data.rates.SAR || 1);
          exchangeRates.JOD = 1 / (data.rates.JOD || 1);
          exchangeRates.IQD = 1 / (data.rates.IQD || 1);
          exchangeRates.EUR = 1 / (data.rates.EUR || 1);
        }
        return true;
      } catch(err){
        console.warn('Failed to fetch live rates:', err);
        return false;
      }
    }

    document.addEventListener('DOMContentLoaded', async function(){
      const currencySelect = document.getElementById('cc-currency');
      const amountInput = document.getElementById('cc-amount');
      const convertBtn = document.getElementById('cc-convert');
      const resetBtn = document.getElementById('cc-reset');
      const resultDiv = document.getElementById('cc-result');
      const fromDisplay = document.getElementById('cc-from-display');
      const toDisplay = document.getElementById('cc-to-display');
      const rateInfo = document.getElementById('cc-rate-info');

      // Fetch rates on page load
      const ratesLoaded = await fetchExchangeRates();
      
      function convert(){
        const currency = currencySelect.value;
        const amount = parseFloat(amountInput.value) || 0;
        const rate = exchangeRates[currency];
        
        if(!rate){
          rateInfo.textContent = 'Loading exchange rates...';
          return;
        }
        
        const result = (amount * rate).toFixed(2);

        fromDisplay.textContent = amount.toLocaleString() + ' ' + currency;
        toDisplay.textContent = '💵 ' + result + ' USD';
        rateInfo.textContent = 'Exchange Rate: 1 ' + currency + ' = ' + rate.toFixed(6) + ' USD';
        resultDiv.style.display = 'block';
      }

      convertBtn.addEventListener('click', convert);
      resetBtn.addEventListener('click', () => {
        amountInput.value = '1';
        currencySelect.value = 'SYP';
        resultDiv.style.display = 'none';
      });

      // Auto-convert on input
      amountInput.addEventListener('input', convert);
      currencySelect.addEventListener('change', convert);

      // Initial conversion
      if(ratesLoaded){
        convert();
      }
      
      // Refresh rates every 5 minutes
      setInterval(fetchExchangeRates, 5 * 60 * 1000);
    });
  </script>
