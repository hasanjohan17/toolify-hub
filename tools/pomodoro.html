<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <base href="../">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pomodoro Timer — Quarx AI</title>
  <meta name="description" content="Simple Pomodoro focus timer with alerts.">
  <link rel="canonical" href="./tools/pomodoro.html">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="icon" href="../favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="../favicon.png">
  <link rel="preload" href="./css/style.css" as="style" onload="this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="./css/style.css"></noscript>
</head>
<body data-page="tool-pomodoro">
  <div id="site-header"></div>
  <main class="container tool">
    <h1 class="tool-title" data-i18n="tool.pomodoro">Pomodoro Timer</h1>
    <p style="color:var(--muted)" data-i18n="pom.lead">25/5 minute focus cycles with notifications.</p>

    <section class="panel" style="text-align:center">
      <div id="pom-time" style="font-size:48px;font-weight:700">25:00</div>
      <div style="margin-top:12px">
        <button id="pom-start" class="btn" data-i18n="pom.btn.start">Start</button>
        <button id="pom-stop" class="btn btn-ghost" data-i18n="pom.btn.stop">Stop</button>
        <button id="pom-reset" class="btn btn-small" data-i18n="pom.btn.reset">Reset</button>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="./js/main.js" defer></script>
</body>
</html>
