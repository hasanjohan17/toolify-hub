  <meta charset="utf-8">
  <base href="../">

  <meta name="description" content="Generate secure passwords instantly. Create strong, random passwords with custom length and character types. Copy with one click.">

  <script>!function(){var t=localStorage.getItem('devtools-theme'),e=t||((window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light');if('dark'===e){if(!document.documentElement.style.colorScheme)document.documentElement.style.colorScheme='dark';document.body.setAttribute('data-theme','dark')}else{document.documentElement.style.colorScheme='light';document.body.removeAttribute('data-theme')}}()</script>

<body data-page="tool-password-generator">
  <div id="site-header"></div>
  <main class="container tool">
    <h1 class="tool-title" data-i18n="tool.password_generator">Password Generator</h1>
    <p style="color:var(--muted)" data-i18n="pw.lead">Create strong passwords with options.</p>

    <section class="panel">
      <label for="pw-length" data-i18n="pw.label.length">Length</label>
      <input id="pw-length" type="number" min="4" max="128" value="16" style="padding:8px;border-radius:8px;border:1px solid rgba(15,23,42,0.04);width:120px">
      <div style="margin-top:10px">
        <label><input id="pw-upper" type="checkbox" checked> <span data-i18n="pw.opt.upper">Include uppercase</span></label>
        <label style="margin-left:10px"><input id="pw-lower" type="checkbox" checked> <span data-i18n="pw.opt.lower">Include lowercase</span></label>
        <label style="margin-left:10px"><input id="pw-numbers" type="checkbox" checked> <span data-i18n="pw.opt.numbers">Include numbers</span></label>
        <label style="margin-left:10px"><input id="pw-symbols" type="checkbox"> <span data-i18n="pw.opt.symbols">Include symbols</span></label>
      </div>
      <div class="tool-actions" style="margin-top:12px">
        <button id="pw-generate" class="btn" data-i18n="pw.btn.generate">Generate</button>
        <button id="pw-copy" class="btn btn-small" data-i18n="pw.btn.copy">Copy</button>
      </div>
    </section>

    <section class="panel">
      <label for="pw-output" data-i18n="pw.label.output">Password</label>
      <input id="pw-output" readonly style="width:100%;padding:12px;border-radius:8px;border:1px solid rgba(15,23,42,0.04);background:transparent">
      <!-- Ad Middle -->
    </section>

    <!-- Related Tools Section -->
    <section class="panel" style="margin-top:20px">
      <h2 style="margin-top:0">Related Tools</h2>
      <div style="display:flex;gap:12px;flex-wrap:wrap">

        <a href="../tools/json-formatter.html" class="btn btn-small">JSON Formatter</a>
        <a href="../tools/qr-code.html" class="btn btn-small">QR Code Generator</a>
      </div>
    </section>

    <!-- Social Sharing Section -->
    <section class="panel" style="margin-top:20px;text-align:center">
      <h2 style="margin-top:0">Share This Tool</h2>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <a href="https://twitter.com/intent/tweet?url=https://quarx-ai.vercel.app/tools/password-generator.html&text=Generate%20strong%20secure%20passwords%20instantly%20with%20this%20free%20Password%20Generator%20from%20Quarx%20AI" target="_blank" class="btn btn-small">Twitter</a>
