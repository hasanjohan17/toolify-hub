<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <base href="../">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Images to PDF — Quarx AI | Convert Multiple Images to PDF</title>
  <meta name="description" content="Convert multiple images into a single PDF file. Choose page size, orientation, and arrange images easily.">
  <meta name="keywords" content="images to pdf, convert images, pdf converter, image to pdf, combine images">
  <link rel="canonical" href="./tools/images-to-pdf.html">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="icon" href="../favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="../favicon.png">
  <script>!function(){var t=localStorage.getItem('devtools-theme'),e=t||((window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light');if('dark'===e){if(!document.documentElement.style.colorScheme)document.documentElement.style.colorScheme='dark';document.body.setAttribute('data-theme','dark')}else{document.documentElement.style.colorScheme='light';document.body.removeAttribute('data-theme')}}()</script>
  <link rel="preload" href="./css/style.css" as="style" onload="this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="./css/style.css"></noscript>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    .img-preview { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; }
    .img-item { position: relative; width: 120px; height: 120px; border: 1px solid rgba(15,23,42,0.1); border-radius: 8px; overflow: hidden; background: rgba(15,23,42,0.03); }
    .img-item img { width: 100%; height: 100%; object-fit: cover; }
    .img-item .remove { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; background: rgba(255, 59, 48, 0.9); color: white; border: none; border-radius: 50%; cursor: pointer; font-size: 12px; line-height: 1; }
    .img-item .remove:hover { background: rgba(255, 59, 48, 1); }
    .no-images { padding: 20px; text-align: center; color: var(--muted); }
  </style>
</head>
<body data-page="tool-i2pdf">
  <div id="site-header"></div>
  <main class="container tool">
    <h1 class="tool-title" data-i18n="tool.images_to_pdf">Images to PDF</h1>
    <p style="color:var(--muted)" data-i18n="i2pdf.lead">Combine multiple images into a single PDF file.</p>

    <section class="panel">
      <label data-i18n="i2pdf.label.images">Images</label>
      <input id="img-upload" type="file" multiple accept="image/*" style="padding:10px;border-radius:8px;border:1px solid rgba(15,23,42,0.04);width:100%">
      
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px">
        <div>
          <label data-i18n="i2pdf.label.pagesize">Page Size</label>
          <select id="page-size" style="padding:8px;border-radius:8px;border:1px solid rgba(15,23,42,0.04);width:100%">
            <option value="A4">A4 (210x297mm)</option>
            <option value="A3">A3 (297x420mm)</option>
            <option value="Letter">Letter (8.5x11in)</option>
            <option value="A5">A5 (148x210mm)</option>
          </select>
        </div>
        <div>
          <label data-i18n="i2pdf.label.orientation">Orientation</label>
          <select id="orientation" style="padding:8px;border-radius:8px;border:1px solid rgba(15,23,42,0.04);width:100%">
            <option value="portrait" data-i18n-key="i2pdf.opt.portrait">Portrait</option>
            <option value="landscape" data-i18n-key="i2pdf.opt.landscape">Landscape</option>
          </select>
        </div>
      </div>

      <div style="margin-top:14px">
        <label>Preview:</label>
        <div id="preview" class="img-preview">
          <div class="no-images" data-i18n="i2pdf.label.images">No images selected</div>
        </div>
      </div>

      <div class="tool-actions" style="margin-top:14px">
        <button id="gen-pdf" class="btn" data-i18n="i2pdf.btn.generate">Generate PDF</button>
        <button id="download-pdf" class="btn" data-i18n="i2pdf.btn.download" style="display:none;">Download PDF</button>
        <button id="reset-img" class="btn btn-ghost" data-i18n="i2pdf.btn.reset">Reset</button>
      </div>
      
      <div id="pdf-viewer" style="margin-top:20px;display:none;border:1px solid rgba(15,23,42,0.1);border-radius:8px;overflow:hidden;background:white">
        <iframe id="pdf-iframe" style="width:100%;height:600px;border:none;display:block"></iframe>
      </div>
    </section>

  </main>
  <div id="site-footer"></div>
  <script src="./js/main.js" defer></script>
  <script>
    (function(){
      const imgInput = document.getElementById('img-upload');
      const preview = document.getElementById('preview');
      const pageSize = document.getElementById('page-size');
      const orientation = document.getElementById('orientation');
      const genPdfBtn = document.getElementById('gen-pdf');
      const downloadBtn = document.getElementById('download-pdf');
      const resetBtn = document.getElementById('reset-img');
      const pdfViewer = document.getElementById('pdf-viewer');
      const pdfIframe = document.getElementById('pdf-iframe');
      
      let images = [];
      let currentPdf = null;

      function updatePreview(){
        preview.innerHTML = '';
        if(images.length === 0){
          preview.innerHTML = '<div class="no-images" data-i18n="i2pdf.label.images">No images selected</div>';
          return;
        }
        images.forEach((img, idx) => {
          const item = document.createElement('div');
          item.className = 'img-item';
          item.innerHTML = `<img src="${img.data}" alt="Image ${idx+1}"><button class="remove" type="button">×</button>`;
          item.querySelector('.remove').onclick = () => {
            images.splice(idx, 1);
            updatePreview();
          };
          preview.appendChild(item);
        });
      }

      imgInput.addEventListener('change', (e) => {
        const files = Array.from(e.target.files);
        files.forEach(file => {
          const reader = new FileReader();
          reader.onload = (event) => {
            images.push({ name: file.name, data: event.target.result });
            updatePreview();
          };
          reader.readAsDataURL(file);
        });
      });

      genPdfBtn.addEventListener('click', async () => {
        if(images.length === 0) {
          alert('Please select at least one image');
          return;
        }
        
        genPdfBtn.disabled = true;
        const originalText = genPdfBtn.textContent;
        genPdfBtn.textContent = 'Generating...';
        
        try {
          const { jsPDF } = window.jspdf;
          const orient = orientation.value === 'landscape' ? 'l' : 'p';
          const pdf = new jsPDF({
            orientation: orient,
            unit: 'mm',
            format: pageSize.value
          });

          const pageWidth = pdf.internal.pageSize.getWidth();
          const pageHeight = pdf.internal.pageSize.getHeight();

          for(let i = 0; i < images.length; i++){
            if(i > 0) pdf.addPage();
            
            const img = new Image();
            img.onload = () => {
              const imgWidth = img.naturalWidth;
              const imgHeight = img.naturalHeight;
              const ratio = imgWidth / imgHeight;
              
              let width = pageWidth - 10;
              let height = width / ratio;
              
              if(height > pageHeight - 10){
                height = pageHeight - 10;
                width = height * ratio;
              }
              
              const x = (pageWidth - width) / 2;
              const y = (pageHeight - height) / 2;
              
              pdf.addImage(images[i].data, 'JPEG', x, y, width, height);
            };
            img.src = images[i].data;
            
            await new Promise(resolve => {
              img.onload = () => {
                const imgWidth = img.naturalWidth;
                const imgHeight = img.naturalHeight;
                const ratio = imgWidth / imgHeight;
                
                let width = pageWidth - 10;
                let height = width / ratio;
                
                if(height > pageHeight - 10){
                  height = pageHeight - 10;
                  width = height * ratio;
                }
                
                const x = (pageWidth - width) / 2;
                const y = (pageHeight - height) / 2;
                
                pdf.addImage(images[i].data, 'JPEG', x, y, width, height);
                resolve();
              };
            });
          }

          currentPdf = pdf;
          const pdfBlob = pdf.output('blob');
          const pdfUrl = URL.createObjectURL(pdfBlob);
          
          pdfIframe.src = pdfUrl;
          pdfViewer.style.display = 'block';
          downloadBtn.style.display = 'inline-block';
          genPdfBtn.textContent = originalText;
          genPdfBtn.disabled = false;
          
        } catch(err){
          console.error(err);
          alert('Error generating PDF: ' + err.message);
          genPdfBtn.textContent = originalText;
          genPdfBtn.disabled = false;
        }
      });

      downloadBtn.addEventListener('click', () => {
        if(currentPdf) {
          currentPdf.save('images.pdf');
        }
      });

      resetBtn.addEventListener('click', () => {
        images = [];
        imgInput.value = '';
        currentPdf = null;
        updatePreview();
        pdfViewer.style.display = 'none';
        pdfIframe.src = '';
        downloadBtn.style.display = 'none';
      });
    })();
  </script>
</body>
</html>
