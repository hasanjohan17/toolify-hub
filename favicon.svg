<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
  <!-- Gradient background -->
  <defs>
    <linearGradient id='grad1' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' style='stop-color:#3b82f6;stop-opacity:1' />
      <stop offset='50%' style='stop-color:#6366f1;stop-opacity:1' />
      <stop offset='100%' style='stop-color:#8b5cf6;stop-opacity:1' />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect width='100' height='100' rx='20' fill='url(#grad1)'/>
  
  <!-- Wrench icon base -->
  <g transform='translate(35, 30)'>
    <!-- Wrench -->
    <path d='M8 2 L18 12 M15 14 L25 24 M12 8 C12 12 9 15 5 15 C1 15 0 12 0 12 Z' stroke='white' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/>
    <!-- Settings gear -->
    <circle cx='28' cy='28' r='4' fill='#a78bfa' opacity='0.8'/>
    <circle cx='28' cy='28' r='6' fill='none' stroke='#a78bfa' stroke-width='1' opacity='0.6'/>
  </g>
  
  <!-- Center T letter with glow effect -->
  <text x='50' y='62' font-family='Inter, Arial' font-weight='800' font-size='52' fill='white' text-anchor='middle' letter-spacing='-2'>T</text>
  
  <!-- Accent dots -->
  <circle cx='15' cy='20' r='2' fill='#60a5fa' opacity='0.7'/>
  <circle cx='85' cy='75' r='1.5' fill='#c4b5fd' opacity='0.6'/>
  <circle cx='78' cy='25' r='1.5' fill='#ddd6fe' opacity='0.5'/>
</svg>